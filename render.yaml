services:
  - type: web
    name: testpilot-poc01-testcase-gen
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: cd poc-01-testcase-gen/backend && pip install -r requirements.txt
    startCommand: cd poc-01-testcase-gen/backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard — never commit the value
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: OUTPUT_DIR
        value: /tmp/outputs
      - key: MAX_RETRIES
        value: "3"
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: '["*"]'
